aid: azure-ad
name: Azure Active Directory
description: >-
  Microsoft's cloud-based identity and access management service that helps
  employees sign in and access resources. Azure AD provides OAuth, OpenID
  Connect, SAML, and other identity protocols for securing applications and
  managing user identities.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Authentication
- Authorization
- Identity
- OAuth
- OpenID Connect
- Single Sign-On
